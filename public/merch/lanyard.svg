<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000">
  <defs>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="18"/></filter>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F0EEE8"/>
    </linearGradient>
    <g id="logo">
      <path d="M0,-11 L9.5,-5.5 L9.5,5.5 L0,11 L-9.5,5.5 L-9.5,-5.5 Z" fill="none" stroke="#161614" stroke-width="1.6"/>
      <path d="M0,-6.2 L5,-3.4 L0,-0.6 L-5,-3.4 Z" fill="#161614"/>
      <path d="M-5,-3.4 L0,-0.6 L0,5.8 L-5,3 Z" fill="#161614" opacity="0.72"/>
      <path d="M5,-3.4 L0,-0.6 L0,5.8 L5,3 Z" fill="#161614" opacity="0.45"/>
    </g>
  </defs>
  <rect width="800" height="1000" fill="#F6F5F1"/>
  <ellipse cx="400" cy="836" rx="170" ry="20" fill="#161614" opacity="0.10" filter="url(#soft)"/>
  <!-- lanyard straps -->
  <path d="M282 120 C300 260 360 380 392 470" fill="none" stroke="#7F8B2F" stroke-width="30"/>
  <path d="M518 120 C500 260 440 380 408 470" fill="none" stroke="#7F8B2F" stroke-width="30"/>
  <path d="M282 120 C300 260 360 380 392 470" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="2 14" opacity=".8"/>
  <path d="M518 120 C500 260 440 380 408 470" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="2 14" opacity=".8"/>
  <!-- clip -->
  <rect x="384" y="462" width="32" height="34" rx="6" fill="#161614"/>
  <circle cx="400" cy="510" r="9" fill="none" stroke="#161614" stroke-width="6"/>
  <!-- badge -->
  <rect x="272" y="520" width="256" height="296" rx="18" fill="url(#card)" stroke="#E0DDD3" stroke-width="2"/>
  <rect x="384" y="520" width="32" height="14" rx="4" fill="#D8D5CB"/>
  <use href="#logo" transform="translate(400,626) scale(3.4)"/>
  <text x="400" y="706" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" letter-spacing="6" fill="#161614">HEXA SPACE</text>
  <rect x="304" y="740" width="192" height="8" rx="4" fill="#E4E1D7"/>
  <rect x="330" y="760" width="140" height="8" rx="4" fill="#E4E1D7"/>
</svg>
