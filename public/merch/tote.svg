<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000">
  <defs>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="18"/></filter>
    <linearGradient id="canvas" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2EFE7"/><stop offset="1" stop-color="#E4E0D3"/>
    </linearGradient>
    <g id="logo">
      <path d="M0,-11 L9.5,-5.5 L9.5,5.5 L0,11 L-9.5,5.5 L-9.5,-5.5 Z" fill="none" stroke="#161614" stroke-width="1.6"/>
      <path d="M0,-6.2 L5,-3.4 L0,-0.6 L-5,-3.4 Z" fill="#161614"/>
      <path d="M-5,-3.4 L0,-0.6 L0,5.8 L-5,3 Z" fill="#161614" opacity="0.72"/>
      <path d="M5,-3.4 L0,-0.6 L0,5.8 L5,3 Z" fill="#161614" opacity="0.45"/>
    </g>
  </defs>
  <rect width="800" height="1000" fill="#F6F5F1"/>
  <ellipse cx="400" cy="822" rx="225" ry="24" fill="#161614" opacity="0.10" filter="url(#soft)"/>
  <!-- straps -->
  <path d="M310 380 C310 235 490 235 490 380" fill="none" stroke="#161614" stroke-width="16" stroke-linecap="round"/>
  <path d="M310 380 C310 250 490 250 490 380" fill="none" stroke="#2A2A26" stroke-width="6" opacity=".35"/>
  <!-- bag body -->
  <path d="M240 372 L560 372 L548 800 L252 800 Z" fill="url(#canvas)" stroke="#D5D1C3" stroke-width="2"/>
  <path d="M240 372 L560 372 L556 400 L244 400 Z" fill="#161614" opacity="0.05"/>
  <path d="M252 800 L548 800 L544 812 L256 812 Z" fill="#DBD7C9"/>
  <!-- stitching -->
  <line x1="258" y1="392" x2="542" y2="392" stroke="#C9C4B4" stroke-width="2" stroke-dasharray="6 5"/>
  <!-- brand -->
  <use href="#logo" transform="translate(400,540) scale(4.6)"/>
  <text x="400" y="640" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" letter-spacing="10" fill="#161614">HEXA SPACE</text>
  <text x="400" y="672" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="6" fill="#7F8B2F">BOX HILL · MELBOURNE</text>
</svg>
