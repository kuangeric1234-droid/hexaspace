<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000">
  <defs>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="18"/></filter>
    <linearGradient id="leather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F3F1F6"/><stop offset="1" stop-color="#E3E1E8"/>
    </linearGradient>
    <g id="logo">
      <path d="M0,-11 L9.5,-5.5 L9.5,5.5 L0,11 L-9.5,5.5 L-9.5,-5.5 Z" fill="none" stroke="#161614" stroke-width="1.6"/>
      <path d="M0,-6.2 L5,-3.4 L0,-0.6 L-5,-3.4 Z" fill="#161614"/>
      <path d="M-5,-3.4 L0,-0.6 L0,5.8 L-5,3 Z" fill="#161614" opacity="0.72"/>
      <path d="M5,-3.4 L0,-0.6 L0,5.8 L5,3 Z" fill="#161614" opacity="0.45"/>
    </g>
  </defs>
  <rect width="800" height="1000" fill="#F6F5F1"/>
  <ellipse cx="400" cy="694" rx="215" ry="22" fill="#161614" opacity="0.10" filter="url(#soft)"/>
  <!-- card peeking out -->
  <rect x="238" y="330" width="324" height="200" rx="16" fill="#7F8B2F"/>
  <text x="262" y="372" font-family="Arial, Helvetica, sans-serif" font-size="14" letter-spacing="6" fill="#FFFFFF" opacity=".9">MEMBER</text>
  <!-- holder -->
  <rect x="212" y="404" width="376" height="284" rx="20" fill="url(#leather)" stroke="#D9D6DE" stroke-width="2"/>
  <path d="M212 460 C300 436 500 436 588 460 L588 424 C588 413 579 404 568 404 L232 404 C221 404 212 413 212 424 Z" fill="#161614" opacity="0.04"/>
  <!-- slot stitching -->
  <line x1="234" y1="560" x2="566" y2="560" stroke="#CBC8D1" stroke-width="2" stroke-dasharray="7 5"/>
  <!-- brand -->
  <use href="#logo" transform="translate(400,626) scale(2.6)"/>
</svg>
