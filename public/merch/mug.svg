      <path d="M-5,-3.4 L0,-0.6 L0,5.8 L-5,3 Z" fill="#7F8B2F" opacity="0.72"/>
      <path d="M5,-3.4 L0,-0.6 L0,5.8 L5,3 Z" fill="#7F8B2F" opacity="0.45"/>
    </g>
  </defs>
  <rect width="800" height="1000" fill="#F6F5F1"/>
